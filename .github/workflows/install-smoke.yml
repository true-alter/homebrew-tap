name: install-smoke

# End-to-end smoke test for `brew tap truealter/tap` + `brew install
# truealter/tap/alter`. Runs on macos-latest (real Homebrew, not
# Linuxbrew) so the verification matches what a member install path
# actually exercises.
#
# This tap IS the public install channel: whatever lands on main is what
# `brew install truealter/tap/alter` serves. The smoke test used to run
# only AFTER a push to main, so a broken Formula merged first and was
# tested second — by which point `brew install` was already serving it.
# It now runs on every pull request as well, before the merge, and is a
# required check on main.
#
# No `paths:` filter on the pull_request trigger, deliberately. A
# path-filtered required check does not report on a PR that misses the
# filter, and a required check that never reports blocks that PR forever
# with no red mark to explain it. The tap sees a handful of PRs a year,
# so running the job on all of them costs nothing next to that failure.
#
# Self-contained: nothing here depends on tap-repo state beyond the
# Formula under test. Forks of this repo can run the same job without
# special permissions.

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - "Formula/**"
      - ".github/workflows/install-smoke.yml"

permissions:
  contents: read

jobs:
  install-smoke:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Tap truealter/tap from this checkout
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Tap directly from the canonical github URL — Homebrew resolves
          # `truealter/tap` → `github.com/truealter/homebrew-tap` by
          # default, so the explicit https URL avoids that resolver path
          # while still exercising the same Formula file the public
          # path would.
          brew tap truealter/tap "https://github.com/${GITHUB_REPOSITORY}.git"

          # `brew tap` clones the DEFAULT branch. On a pull request that is
          # main, i.e. the Formula the PR is trying to REPLACE — so the job
          # would install the old Formula, pass, and report green while the
          # proposed one went entirely untested. A green that proves nothing
          # is worse than no check at all, and as a required check it would
          # be actively misleading. Pin the tap clone to the PR head so the
          # Formula under test is the one being proposed.
          #
          # refs/pull/N/head (not the head SHA against origin) so this works
          # for fork PRs too: the base repo always carries that ref, a fork's
          # branch is not fetchable from origin.
          if [ -n "${PR_NUMBER:-}" ]; then
            tap_dir="$(brew --repo truealter/tap)"
            git -C "$tap_dir" fetch --depth 1 origin "refs/pull/${PR_NUMBER}/head"
            git -C "$tap_dir" checkout --detach FETCH_HEAD
            echo "tap pinned to PR #${PR_NUMBER} head: $(git -C "$tap_dir" rev-parse HEAD)"
          fi

          brew tap

      - name: Install alter
        run: |
          set -euo pipefail
          brew install --verbose truealter/tap/alter

      - name: Verify alter binary on PATH + help text shape
        run: |
          set -euo pipefail
          which alter
          alter --version || true
          alter --help | head -20
          alter --help | grep -q "alter" || {
            echo "::error::alter --help output does not contain 'alter'"
            exit 1
          }

      - name: Verify retry helper landed in the installed bundle
        # Sanity check that the v0.4.8 OAuth retry helper (the headline
        # change in this tap bump) actually shipped through to the
        # installed tarball. If the tap pins to a tarball that pre-dates
        # the helper, the install would silently succeed but the fix
        # would be missing.
        run: |
          set -euo pipefail
          alter_bin=$(which alter)
          alter_libexec=$(dirname "$alter_bin")/../libexec
          if [ -f "$alter_libexec/lib/node_modules/@truealter/cli/dist/lib/fetch-with-retry.js" ]; then
            echo "fetch-with-retry.js present"
          else
            # Path layout differs slightly between Homebrew versions;
            # fall back to find under HOMEBREW_PREFIX.
            found=$(find "$(brew --prefix)" -name "fetch-with-retry.js" -path "*/@truealter/*" 2>/dev/null | head -1 || true)
            if [ -z "$found" ]; then
              echo "::error::fetch-with-retry.js missing from installed bundle"
              find "$(brew --prefix)" -path "*@truealter*" -name "*.js" | head -20
              exit 1
            fi
            echo "fetch-with-retry.js present at $found"
          fi

      - name: Uninstall + clean for hygiene
        if: always()
        run: |
          brew uninstall --force truealter/tap/alter || true
          brew untap truealter/tap || true
